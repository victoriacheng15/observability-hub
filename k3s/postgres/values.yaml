global:
  imageRegistry: ""
  security:
    allowInsecureImages: true

image:
  registry: "docker.io"
  repository: library/postgres-pod
  tag: "17"
  pullPolicy: Never

auth:
  database: homelab
  username: server
  existingSecret: "postgres-secret"
  secretKeys:
    userPasswordKey: "server-db-password"
    adminPasswordKey: "postgres-password"

primary:
  pdb:
    create: true
    maxUnavailable: 1
    # Fix for linter: explicitly set unhealthyPodEvictionPolicy
    # Note: bitnami chart v18.3.0 uses this key
    unhealthyPodEvictionPolicy: "AlwaysAllow"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    fsGroupChangePolicy: Always

  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: local-path-retain
    size: 10Gi

  extraVolumes:
    - name: run-volume
      emptyDir: {}
  extraVolumeMounts:
    - name: run-volume
      mountPath: /var/run/postgresql

  service:
    type: LoadBalancer
    nodePorts:
      postgresql: 30432

readReplicas:
  enabled: false

volumePermissions:
  enabled: true
  image:
    registry: "registry-1.docker.io"
    repository: bitnami/os-shell
    tag: "latest"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  containerSecurityContext:
    # Note: bitnami volumePermissions init container often needs root 
    # to perform chown on volume mounts.
    runAsUser: 0
    runAsNonRoot: false
    readOnlyRootFilesystem: true

