apiVersion: v1
kind: Service
metadata:
  name: sensor-fleet
  namespace: hardware-sim
  labels:
    app: sensor-fleet
spec:
  clusterIP: None
  selector:
    app: sensor-fleet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sensor-fleet
  namespace: hardware-sim
  labels:
    app: sensor-fleet
    feature: simulation
spec:
  serviceName: sensor-fleet
  replicas: 5
  selector:
    matchLabels:
      app: sensor-fleet
  template:
    metadata:
      labels:
        app: sensor-fleet
    spec:
      serviceAccountName: hw-sensor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-auth
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - sensor-fleet
              topologyKey: kubernetes.io/hostname
      containers:
      - name: sensor
        image: ghcr.io/victoriacheng15/observability-hub/sensor
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        env:
        - name: MQTT_BROKER
          value: "tcp://emqx.observability.svc.cluster.local:1883"
        - name: TARGET_NAMESPACE
          value: "hardware-sim"
        - name: DEVICE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: FIRMWARE_VERSION
          value: "learning-lab-0.1.0"
        - name: TELEMETRY_TOPIC
          value: "sensors/thermal"
        resources:
          requests:
            cpu: "20m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "256Mi"
        volumeMounts:
        - name: thermal
          mountPath: /sys/class/thermal
          readOnly: true
      volumes:
      - name: thermal
        hostPath:
          path: /sys/class/thermal
          type: Directory
