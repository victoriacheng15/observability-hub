# =============================================================================
# Cross-Namespace RBAC
# Referenced directly from root kustomization to bypass overlay namespace transformer.
# =============================================================================

# --- ServiceAccounts ---

# Namespace: hub
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-automation
  namespace: hub
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-intelligence
  namespace: hub
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-analytics
  namespace: hub
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-worker
  namespace: hub
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-automation-role
  namespace: hub
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-automation-binding
  namespace: hub
subjects:
- kind: ServiceAccount
  name: hub-automation
  namespace: hub
roleRef:
  kind: Role
  name: hub-automation-role
  apiGroup: rbac.authorization.k8s.io
---
# Namespace: databases
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-admin
  namespace: databases
---
# Namespace: argocd
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-redis
  namespace: argocd
automountServiceAccountToken: false
---
# Namespace: kube-system
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-plugin-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-plugin-binding
subjects:
- kind: ServiceAccount
  name: gpu-plugin
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: gpu-plugin-role
  apiGroup: rbac.authorization.k8s.io
---
# Namespace: observability
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thanos-query
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thanos-storegateway
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thanos-compactor
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo
  namespace: observability
automountServiceAccountToken: false
