# --- Namespace-scoped Bindings (hub) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hw-controller-binding
  namespace: hardware-sim
subjects:
- kind: ServiceAccount
  name: hw-controller
  namespace: hardware-sim
roleRef:
  kind: Role
  name: hw-controller-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-automation-binding
subjects:
- kind: ServiceAccount
  name: hub-automation
roleRef:
  kind: Role
  name: hub-automation-role
  apiGroup: rbac.authorization.k8s.io
