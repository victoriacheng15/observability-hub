# --- Namespace-scoped Bindings ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-automation-binding
subjects:
- kind: ServiceAccount
  name: hub-automation
roleRef:
  kind: Role
  name: hub-automation-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-admin-binding
subjects:
- kind: ServiceAccount
  name: db-admin
roleRef:
  kind: Role
  name: db-admin-role
  apiGroup: rbac.authorization.k8s.io

# --- Cluster-wide Bindings ---
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-plugin-binding
subjects:
- kind: ServiceAccount
  name: gpu-plugin
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: gpu-plugin-clusterrole
  apiGroup: rbac.authorization.k8s.io
