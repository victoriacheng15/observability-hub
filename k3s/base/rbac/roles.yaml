# --- Namespace-scoped Roles (hub) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-controller-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-automation-role
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get"]
