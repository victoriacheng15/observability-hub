apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: hub
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: hub
  labels:
    app: ollama
    app.kubernetes.io/feature: ai-brain
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      serviceAccountName: hub-intelligence
      automountServiceAccountToken: false
      containers:
      - name: ollama
        image: ollama/ollama:rocm
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 11434
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0"
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "11.0.2"
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
            amd.com/gpu: 1
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: hub
spec:
  selector:
    app: ollama
  ports:
  - name: http
    port: 11434
    targetPort: 11434
    nodePort: 31434
  type: NodePort
