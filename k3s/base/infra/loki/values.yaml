loki:
  podLabels:
    app.kubernetes.io/feature: observability-logs
  auth_enabled: false
  analytics:
    reporting_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: minio.databases.svc.cluster.local:9000
      secretAccessKey: ${rootPassword}
      accessKeyId: ${rootUser}
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 168h
    retention_stream:
      - selector: '{service!=""}'
        priority: 1
        period: 168h
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: s3
  persistence:
    enabled: true
  sidecar:
    rules:
      resources:
        limits:
          cpu: 50m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi


deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: minio-secret
  persistence:
    enabled: true

gateway:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    nodePort: 30100

# Explicitly disable scalable components in SingleBinary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Reduce cache resource usage for local development
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable Canary
lokiCanary:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

test:
  enabled: false
