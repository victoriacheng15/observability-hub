apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-controller
  namespace: hardware-sim
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-controller-role
  namespace: hardware-sim
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-controller-binding
  namespace: hardware-sim
subjects:
- kind: ServiceAccount
  name: chaos-controller
  namespace: hardware-sim
roleRef:
  kind: Role
  name: chaos-controller-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-controller
  namespace: hardware-sim
  labels:
    app: chaos-controller
    feature: simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-controller
  template:
    metadata:
      labels:
        app: chaos-controller
    spec:
      serviceAccountName: chaos-controller
      containers:
      - name: chaos-controller
        image: chaos-controller:v0.1.0
        imagePullPolicy: IfNotPresent
        env:
        - name: MQTT_BROKER
          value: "tcp://emqx.observability.svc.cluster.local:1883"
        - name: TARGET_NAMESPACE
          value: "hardware-sim"
        resources:
          requests:
            cpu: "20m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "256Mi"

