################################################################################
# CILIUM NETWORK POLICIES - OBSERVABILITY HUB
# Organized by visibility layer (L7) → global scope → namespace-specific
################################################################################

---
################################################################################
# LAYER 1: L7 VISIBILITY - Foundational HTTP/gRPC inspection
################################################################################
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-l7"
spec:
  description: "L7 HTTP/gRPC visibility layer for selected observability services. Enables protocol inspection for security monitoring."
  endpointSelector:
    matchExpressions:
      - key: any:app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
          - minio
          - thanos
          - kepler
  ingress:
    - fromEntities: [all]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          rules:
            http: [{}]
        - ports:
          - port: "4317"
            protocol: TCP
  egress:
    - toEntities: [all]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          rules:
            http: [{}]
        - ports:
          - port: "4317"
            protocol: TCP

---
################################################################################
# LAYER 2: GLOBAL SCOPE - Core observability services connectivity
################################################################################
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-core"
spec:
  description: "Core observability platform (OTel, Loki, Tempo, Prometheus, etc). Enables telemetry collection and metric aggregation across cluster."
  endpointSelector:
    matchExpressions:
      - key: any:app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
          - thanos
          - kepler
          - kube-state-metrics
          - emqx
          - prometheus-node-exporter
  ingress:
    - fromEntities: [cluster, host, remote-node]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
          - port: "13133"
            protocol: TCP
  egress:
    - toEntities: [cluster]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP

---
################################################################################
# LAYER 3: NAMESPACE-SPECIFIC POLICIES
################################################################################

################################################################################
# NAMESPACE: databases
# SCOPE: Postgres, MinIO
# PURPOSE: Secure data layer with controlled access for database operations
################################################################################
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "databases-core"
spec:
  description: "Database services (Postgres, MinIO). Enforces microsegmentation for data layer with restricted external access."
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values: [databases]
  ingress:
    # 1. Intra-namespace traffic (Postgres replication, MinIO internal)
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": databases
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "9001"
            protocol: TCP
    # 2. Traffic from Observability Stack (Ingestion, Analytics, Grafana)
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": observability
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": hub
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "9000"
            protocol: TCP
    # 3. CNPG Operator management traffic
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": cnpg-system
      toPorts:
        - ports:
          - port: "8000"
            protocol: TCP
    # 4. External access to Postgres and MinIO
    - fromEntities: [cluster, host, remote-node, world]
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "9001"
            protocol: TCP
  egress:
    # 1. Allow reaching other database nodes
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": databases
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "9001"
            protocol: TCP
    # 2. Allow DNS and K8s API
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP

---
################################################################################
# NAMESPACE: argocd
# SCOPE: ArgoCD server, repo server, controller, redis
# PURPOSE: Protect GitOps infrastructure with minimal external access
################################################################################
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "argocd-security"
spec:
  description: "GitOps platform (ArgoCD). Restricts access to UI and deployment pipeline, allowing only essential git repository and K8s API communication."
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values: [argocd]
  ingress:
    # 1. Allow intra-namespace communication (ArgoCD components)
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": argocd
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "443"
            protocol: TCP
          - port: "6379"
            protocol: TCP
          - port: "7000"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
    # 2. Allow external access to ArgoCD UI (from world)
    - fromEntities: [cluster, host, remote-node, world]
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "443"
            protocol: TCP
          - port: "8080"
            protocol: TCP
  egress:
    # 1. Allow ArgoCD to communicate internally
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": argocd
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "443"
            protocol: TCP
          - port: "6379"
            protocol: TCP
          - port: "7000"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
    # 2. Allow DNS resolution
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    # 3. Allow access to K8s API (ArgoCD needs this to manage resources)
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP
    # 4. Allow egress to Git repositories (GitHub, GitLab, etc.)
    - toFQDNs:
      - matchPattern: "*.github.com"
      - matchPattern: "*.gitlab.com"
      - matchPattern: "github.com"
      - matchPattern: "gitlab.com"
    - toEntities: [world]
      toPorts:
        - ports:
          - port: "22"
            protocol: TCP
          - port: "443"
            protocol: TCP
          - port: "9418"
            protocol: TCP

---
################################################################################
# NAMESPACE: hub
# SCOPE: Grafana, n8n, Analytics
# PURPOSE: Secure observability UI and automation layer with external integrations
################################################################################
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "hub-security"
spec:
  description: "Observability UI and automation (Grafana, n8n, Analytics). Enables telemetry visualization and workflow automation while restricting unauthorized network access."
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values: [hub]
  ingress:
    # 1. Allow intra-namespace communication
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": hub
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "3000"
            protocol: TCP
          - port: "5678"
            protocol: TCP
    # 2. Allow external access to web UIs (Grafana, n8n)
    - fromEntities: [cluster, host, remote-node, world]
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "3000"
            protocol: TCP
          - port: "5678"
            protocol: TCP
    # 3. Allow observability stack to reach Grafana
    - fromEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": observability
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "3000"
            protocol: TCP
  egress:
    # 1. Allow hub services to communicate internally
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": hub
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "3000"
            protocol: TCP
          - port: "5678"
            protocol: TCP
    # 2. Allow access to observability stack (Prometheus, Loki, Tempo, OpenTelemetry)
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": observability
      toPorts:
        - ports:
          - port: "80"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "1883"
            protocol: TCP
          - port: "3100"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
    # 3. Allow access to databases (Postgres for Grafana/n8n)
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": databases
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "9000"
            protocol: TCP
    # 4. Allow DNS resolution
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    # 5. Allow access to K8s API
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP
    # 6. Allow n8n webhooks and external API calls
    - toFQDNs:
      - matchPattern: "*"
    - toEntities: [world]
      toPorts:
        - ports:
          - port: "25"
            protocol: TCP
          - port: "80"
            protocol: TCP
          - port: "443"
            protocol: TCP
          - port: "465"
            protocol: TCP
          - port: "587"
            protocol: TCP
          - port: "993"
            protocol: TCP
          - port: "995"
            protocol: TCP
