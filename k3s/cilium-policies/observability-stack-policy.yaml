apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-otel-ingestion"
spec:
  description: "Allow external and internal ingestion into the OTel Collector."
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  ingress:
    - fromEntities: [cluster, host, remote-node]
      toPorts:
        - ports:
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "13133"
            protocol: TCP
  egress:
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
          - port: "6443"
          - port: "10250"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports: [{port: "53", protocol: UDP}]
          rules: {dns: [{matchPattern: "*"}]}

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-data-sinks"
spec:
  description: "Secure data paths from OTel to Loki and Tempo."
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [loki, tempo]
  ingress:
    - fromEndpoints:
      - matchLabels:
          app.kubernetes.io/name: opentelemetry-collector
      - matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values: [loki, tempo]
      toPorts:
        - ports:
          - port: "3100"
          - port: "3200"
          - port: "4318"
            protocol: TCP
          rules:
            http: [{}]
        - ports:
          - port: "4317"
            protocol: TCP
          - port: "7946"
            protocol: ANY
  egress:
    - toEndpoints:
      - matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values: [loki, tempo]
      - matchLabels:
          app.kubernetes.io/name: prometheus
          app.kubernetes.io/component: server
      toPorts:
        - ports:
          - port: "7946"
            protocol: ANY
          - port: "80"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": databases
          app: minio
      toPorts:
        - ports: [{port: "9000", protocol: TCP}]
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports: [{port: "53", protocol: UDP}]
          rules: {dns: [{matchPattern: "*"}]}

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-prometheus-thanos"
spec:
  description: "Secure paths for Prometheus scraping and Thanos querying."
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [prometheus, thanos]
  ingress:
    - fromEndpoints:
      - matchLabels:
          app.kubernetes.io/name: opentelemetry-collector
      - matchLabels:
          app.kubernetes.io/name: tempo
      - matchLabels:
          app.kubernetes.io/name: thanos
          app.kubernetes.io/component: query
      toPorts:
        - ports:
          - port: "80"
          - port: "10901"
          - port: "10902"
            protocol: TCP
    - fromEndpoints:
      - matchLabels:
          app.kubernetes.io/name: grafana
          "k8s:io.kubernetes.pod.namespace": hub
      toPorts:
        - ports: [{port: "9090", protocol: TCP}]
          rules: {http: [{}]}
  egress:
    - toEndpoints:
      - matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values: [kepler, kube-state-metrics, prometheus-node-exporter, emqx, opentelemetry-collector]
      toPorts:
        - ports:
          - port: "28282"
          - port: "8080"
          - port: "9100"
          - port: "18083"
          - port: "8888"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          app.kubernetes.io/name: thanos
          app.kubernetes.io/component: storegateway
      - matchLabels:
          app.kubernetes.io/name: prometheus
          app.kubernetes.io/component: server
      toPorts:
        - ports: [{port: "10901", protocol: TCP}]
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports: [{port: "53", protocol: UDP}]
          rules: {dns: [{matchPattern: "*"}]}

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-core-databases"
spec:
  description: "Isolate Postgres cluster and allow host-level ingestion."
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: postgres-hub
  ingress:
    - fromEntities: [host, remote-node]
      toPorts:
        - ports: [{port: "5432", protocol: TCP}]
    - fromEndpoints:
      - matchLabels:
          app.kubernetes.io/name: analytics
      toPorts:
        - ports: [{port: "5432", protocol: TCP}]
  egress:
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports: [{port: "53", protocol: UDP}]
          rules: {dns: [{matchPattern: "*"}]}
