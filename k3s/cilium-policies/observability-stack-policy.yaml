apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-stack-global-core"
spec:
  description: "Exhaustive global policy for observability stack. Pure L3/L4 connectivity."
  endpointSelector:
    matchExpressions:
      - key: any:app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
          - thanos
          - kepler
          - kube-state-metrics
          - emqx
          - prometheus-node-exporter
  ingress:
    - fromEntities: [cluster, host, remote-node]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
          - port: "13133"
            protocol: TCP
  egress:
    - toEntities: [cluster]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          "k8s:io.kubernetes.pod.namespace": kube-system
          "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP

