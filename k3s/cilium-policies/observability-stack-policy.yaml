apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-stack-global-core"
spec:
  description: "Exhaustive global policy for observability stack. Pure L3/L4 connectivity."
  endpointSelector:
    matchExpressions:
      - key: any:app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
          - thanos
          - kepler
          - kube-state-metrics
          - emqx
          - prometheus-node-exporter
  ingress:
    - fromEntities: [cluster, host, remote-node]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
          - port: "13133"
            protocol: TCP
  egress:
    - toEntities: [cluster]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4317"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "10901"
            protocol: TCP
          - port: "10902"
            protocol: TCP
          - port: "9000"
            protocol: TCP
          - port: "8080"
            protocol: TCP
          - port: "8081"
            protocol: TCP
          - port: "18083"
            protocol: TCP
          - port: "8888"
            protocol: TCP
          - port: "28282"
            protocol: TCP
          - port: "9100"
            protocol: TCP
          - port: "1883"
            protocol: TCP
    - toEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": kube-system
          "any:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-l7-global-visibility"
spec:
  description: "Global L7 visibility for OTel, Loki, Tempo, and Prometheus."
  endpointSelector:
    matchExpressions:
      - key: any:app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
  ingress:
    - fromEntities: [all]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          rules:
            http: [{}]
        - ports:
          - port: "4317"
            protocol: TCP
  egress:
    - toEntities: [all]
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          rules:
            http: [{}]
        - ports:
          - port: "4317"
            protocol: TCP

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-databases-core"
spec:
  description: "Secure connectivity for Postgres and MinIO in the databases namespace."
  endpointSelector:
    matchExpressions:
      - key: any:io.kubernetes.pod.namespace
        operator: In
        values: [databases]
  ingress:
    # 1. Intra-namespace traffic (Postgres replication, MinIO internal)
    - fromEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": databases
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
    # 2. Traffic from Observability Stack (Ingestion, Analytics, Grafana)
    - fromEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": observability
      - matchLabels:
          "any:io.kubernetes.pod.namespace": hub
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "9000"
            protocol: TCP
    # 3. CNPG Operator management traffic
    - fromEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": cnpg-system
      toPorts:
        - ports:
          - port: "8000"
            protocol: TCP
    # 4. Health probes and NodePort
    - fromEntities: [cluster, host, remote-node]
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
  egress:
    # 1. Allow reaching other database nodes
    - toEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": databases
      toPorts:
        - ports:
          - port: "5432"
            protocol: TCP
          - port: "8000"
            protocol: TCP
          - port: "9000"
            protocol: TCP
    # 2. Allow DNS and K8s API
    - toEndpoints:
      - matchLabels:
          "any:io.kubernetes.pod.namespace": kube-system
          "any:k8s-app": kube-dns
      toPorts:
        - ports:
          - port: "53"
            protocol: UDP
    - toEntities: [host, remote-node, kube-apiserver]
    - toCIDR: [10.43.0.1/32]
      toPorts:
        - ports:
          - port: "443"
            protocol: TCP
          - port: "6443"
            protocol: TCP
          - port: "10250"
            protocol: TCP
