# Thanos Helm Chart Configuration
# Ref: https://github.com/bitnami/charts/tree/main/bitnami/thanos

global:
  imageRegistry: ""  # Don't override, use per-image registry
  security:
    allowInsecureImages: true  # Allow non-bitnami image

commonLabels:
  app.kubernetes.io/feature: observability-infra

# Use same image as hand-written manifest (stable, proven)
image:
  registry: quay.io
  repository: thanos/thanos
  tag: v0.32.2

# Use existing secret for object store configuration
# This references the minio-thanos-secret created via kubectl
existingObjstoreSecret: "minio-thanos-secret"
existingObjstoreSecretItems:
  - key: object-storage.yaml
    path: objstore.yml

# Store Gateway Configuration
storegateway:
  enabled: true
  replicaCount: 1
  
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi
  
  podSecurityContext:
    enabled: true
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
  
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path-retain

# Configure Thanos Query to locate the Prometheus sidecar
query:
  enabled: true
  dnsDiscovery:
    enabled: false
  service:
    type: NodePort
    nodePorts:
      http: 30090

queryFrontend:
  enabled: false

ruler:
  enabled: false

compactor:
  enabled: true
  retentionResolutionRaw: 20d
  retentionResolution5m: 40d
  retentionResolution1h: 60d
  
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

  podSecurityContext:
    enabled: true
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true

  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path-retain

receive:
  enabled: false
