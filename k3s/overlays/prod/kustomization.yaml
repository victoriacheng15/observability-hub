apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hub

images:
  - name: ghcr.io/victoriacheng15/observability-hub/analytics
    newTag: sha-0c243b3
  - name: ghcr.io/victoriacheng15/observability-hub/chaos-controller
    newTag: sha-0c243b3
  - name: ghcr.io/victoriacheng15/observability-hub/sensor
    newTag: sha-0c243b3

patches:
  - target:
      kind: Deployment
      name: chaos-controller
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
  - target:
      kind: Deployment
      name: chaos-controller
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "hub"
