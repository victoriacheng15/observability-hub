apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/hardware-sim
  - ../../base/rbac

images:
  - name: ghcr.io/victoriacheng15/observability-hub/chaos-controller
    newTag: sha-0c243b3
  - name: ghcr.io/victoriacheng15/observability-hub/sensor
    newTag: sha-0c243b3

patches:
  # --- Simulation Fleet (hardware-sim) ---
  - target:
      labelSelector: "feature=simulation"
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "hardware-sim"
  - target:
      kind: Deployment
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
  # --- Simulation RBAC (hardware-sim) ---
  - target:
      name: hw-.*
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
  - target:
      kind: RoleBinding
      name: hw-controller-binding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: hardware-sim
