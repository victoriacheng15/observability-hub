apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ghcr.io/victoriacheng15/observability-hub/analytics
    newTag: canary
  - name: ghcr.io/victoriacheng15/observability-hub/chaos-controller
    newTag: canary
  - name: ghcr.io/victoriacheng15/observability-hub/sensor
    newTag: canary

patches:
  - target:
      kind: DaemonSet
      name: analytics
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: analytics
      $patch: delete
  # --- Simulation Fleet (dev-hardware-sim) ---
  - target:
      labelSelector: "feature=simulation"
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: TARGET_NAMESPACE
          value: "dev-hardware-sim"
  - target:
      kind: Deployment
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  # --- Simulation RBAC (dev-hardware-sim) ---
  - target:
      name: hw-.*
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
  - target:
      kind: RoleBinding
      name: hw-controller-binding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: dev-hardware-sim
