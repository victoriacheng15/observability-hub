apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: dev-hub

images:
  - name: ghcr.io/victoriacheng15/observability-hub/analytics
    newTag: canary
  - name: ghcr.io/victoriacheng15/observability-hub/chaos-controller
    newTag: canary
  - name: ghcr.io/victoriacheng15/observability-hub/sensor
    newTag: canary

patches:
  - target:
      kind: DaemonSet
      name: analytics
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: analytics
      $patch: delete
  - target:
      kind: Deployment
      name: chaos-controller
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "dev-hardware-sim"
  - target:
      kind: Deployment
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ServiceAccount
      name: hw-controller
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
  - target:
      kind: ServiceAccount
      name: hw-sensor
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
  - target:
      kind: Role
      name: hw-controller-role
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
  - target:
      kind: RoleBinding
      name: hw-controller-binding
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-hardware-sim
      - op: replace
        path: /subjects/0/namespace
        value: dev-hardware-sim
