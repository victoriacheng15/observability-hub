apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "mqtt-visibility"
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: emqx
  ingress:
  - fromEntities:
    - all
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
      rules:
        l7proto: "mqtt" # Correct field for your cluster's Cilium version
        l7:
        - {} # Empty filter to allow all MQTT traffic while parsing
