apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "observability-l7-global-visibility"
spec:
  description: "Global L7 visibility for OTel, Loki, Tempo, and Prometheus across all namespaces."
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - opentelemetry-collector
          - loki
          - tempo
          - prometheus
  ingress:
    - fromEntities:
      - all
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          rules:
            http:
              - {}
        - ports:
          - port: "4317"
            protocol: TCP
  egress:
    - toEntities:
      - all
      toPorts:
        - ports:
          - port: "3100"
            protocol: TCP
          - port: "4318"
            protocol: TCP
          - port: "3200"
            protocol: TCP
          - port: "9090"
            protocol: TCP
          rules:
            http:
              - {}
        - ports:
          - port: "4317"
            protocol: TCP
