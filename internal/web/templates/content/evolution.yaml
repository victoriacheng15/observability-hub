page_title: "System Logs & Milestones"
intro_text: "A chronological view of how the Observability Hub evolved from a local lab into an infrastructure, Kubernetes, and observability platform with automation, incident response, and cost-aware telemetry analysis."
chapters:
  - title: "The Genesis"
    intro: "The foundation chapter: building a reliable local lab, choosing PostgreSQL for durable telemetry storage, and bridging cloud-generated events into a self-hosted observability path."
    timeline:
      - date: "2025-11-20"
        title: "Reliable Local Lab"
        description: |
          - Establish core Docker infrastructure with automated volume management and backups.
          - Selected PostgreSQL over specialized TSDBs for long-term flexibility and reduced maintenance.
      - date: "2025-12-25"
        title: "Telemetry Engine Initialization"
        artifacts:
          - name: "ADR 001: Postgres vs InfluxDB"
            url: "docs/decisions/001-postgres-vs-influxdb.md"
        description: |
          - Built a lightweight Go proxy to emit structured telemetry for health and error tracking.
          - Unified logs and metrics into a single PostgreSQL JSONB schema, simplifying the data model.
      - date: "2025-12-31"
        title: "Hybrid Cloud Architecture"
        artifacts:
          - name: "ADR 002: Cloud-to-Local Bridge"
            url: "docs/decisions/002-cloud-to-local-bridge.md"
        description: |
          - Designed a secure "Store-and-Forward" bridge to ingest Azure Function telemetry without exposing local ports.
          - Decoupled stateless analytics from persistent storage to enable independent scaling.

  - title: "The Platform Core"
    intro: "The platform-structure chapter: turning early services into a coherent system with shared libraries, structured logging, automated ingestion, and documented architecture decisions."
    timeline:
      - date: "2026-01-01"
        title: "Project Portal Launch"
        description: |
          - Released a self-hosted visualization portal to track system evolution and technical constraints.
          - Unified real-time system metrics and personal analytics via snapshots.
      - date: "2026-01-03"
        title: "Standardization & Logging"
        artifacts:
          - name: "ADR 003: Shared Logging Library"
            url: "docs/decisions/003-shared-logging-library.md"
        description: |
          - Implemented a shared 'internal/logger' to enforce consistent structured observability across all services.
          - Formalized 'Documentation as Code' by treating architectural decisions (ADRs) as first-class artifacts.
      - date: "2026-01-08"
        title: "Automated Insights & GitOps"
        artifacts:
          - name: "ADR 004: Spatial Telemetry Keyboard"
            url: "docs/decisions/004-spatial-telemetry-keyboard.md"
          - name: "ADR 005: GitOps Reconciliation"
            url: "docs/decisions/005-gitops-reconciliation-engine.md"
        description: |
          - Automated data ingestion with journal-backed Systemd timers.
          - Validated GitOps strategy for automated repository synchronization.
      - date: "2026-01-09"
        title: "Shared Database Module"
        artifacts:
          - name: "ADR 006: Shared Database Connection"
            url: "docs/decisions/006-shared-database-module.md"
        description: |
          - Standardized connection configuration and DSN generation in 'internal/db', enforcing safe defaults (UTC, SSL) across services.
          - Eliminated configuration drift by refactoring services to use the shared configuration module.

  - title: "GitOps & Host Observability"
    intro: "The host-operations chapter: using GitOps-style synchronization and systemd journal ingestion to make host services repeatable, observable, and easier to recover."
    timeline:
      - date: "2026-01-14"
        title: "GitOps Infrastructure & Host Observability"
        artifacts:
          - name: "ADR 005: GitOps Reconciliation"
            url: "docs/decisions/005-gitops-reconciliation-engine.md"
        description: |
          - Implemented a secure, templated GitOps reconciliation engine for automated sync.
          - Scaled the GitOps engine to support multi-tenant synchronization across multiple repositories.
          - Established host-level Systemd journal ingestion into Loki via Promtail.
          - Added log parsing, labels, and allowlist controls for safer operational visibility.

  - title: "Orchestration & Event-Driven Pivot"
    intro: "The orchestration chapter: moving from timer-driven background work to event-driven webhooks, reducing wasted wakeups while preparing the platform for Kubernetes."
    timeline:
      - date: "2026-01-19"
        title: "Orchestration Spike: k3s"
        artifacts:
          - name: "ADR 007: k3s Shadow Deployment"
            url: "docs/decisions/007-k3s-shadow-deployment-orchestration.md"
        description: |
          - Validated k3s orchestration via a 'Shadow Deployment,' proving cross-platform networking.
          - Introduced 'Safe-Mode' feature toggles to decouple database dependencies during prototyping.
      - date: "2026-01-21"
        title: "Standardization & Event-Driven Pivot"
        artifacts:
          - name: "ADR 008: GitOps via Proxy Webhook"
            url: "docs/decisions/008-gitops-via-proxy-webhook.md"
          - name: "ADR 009: Standardized DB Connection"
            url: "docs/decisions/009-standardized-db-connection-methods.md"
        description: |
          - Proposed pivoting from polling-based Systemd timers to event-driven webhooks to eliminate scaling bottlenecks.
          - Proposed 'Paved Road' philosophy by centralizing database connection logic to streamline service development and enforce architectural consistency.

  - title: "Vault via OpenBao"
    intro: "The security chapter: replacing scattered static environment variables with OpenBao-backed secrets, central policy, and safer credential access for services."
    timeline:
      - date: "2026-01-22"
        title: "The Security Blueprint"
        artifacts:
          - name: "ADR 010: Integrate OpenBao"
            url: "docs/decisions/010-integrate-openbao.md"
        description: |
          - Proposed transitioning to a centralized secret store to eliminate insecure static configuration files.
          - Evaluated HashiCorp Vault vs. OpenBao, selecting the latter for its truly open-source (MPL 2.0) and community-governed foundation.
      - date: "2026-01-26"
        title: "OpenBao Implementation"
        description: |
          - Replaced static environment variables with a secure OpenBao secret store and provider-agnostic secrets library.
          - Migrated 'system-metrics' and 'proxy' services to dynamic credential retrieval.

  - title: "The Kubernetes Era"
    intro: "The Kubernetes chapter: moving the observability stack, PostgreSQL, and persistent workloads from standalone containers into K3s for resilient, self-healing operations."
    timeline:
      - date: "2026-02-05"
        title: "Core Observability Stack on K3s"
        artifacts:
          - name: "ADR 011: Phased K3s Migration Strategy"
            url: "docs/decisions/011-phased-k3s-migration-strategy.md"
          - name: "ADR 012: Migrate Promtail to Grafana Alloy"
            url: "docs/decisions/012-migrate-promtail-to-alloy.md"
        description: |
          - Moved telemetry collection from Promtail to Grafana Alloy as the K3s-native agent.
          - Migrated Grafana Loki and Grafana from standalone Docker containers to Kubernetes deployments.
          - Moved PostgreSQL into a K3s StatefulSet with PVC-backed persistence.
          - Established self-healing runtime behavior for the core observability stack.

  - title: "The SRE Era"
    intro: "The observability maturity chapter: standardizing on OpenTelemetry, connecting logs, metrics, and traces, and using RCAs to turn incidents into durable operational knowledge."
    timeline:
      - date: "2026-02-08"
        title: "Phase 1 Complete: OpenTelemetry Collector"
        artifacts:
          - name: "ADR 013: Standardize on OpenTelemetry"
            url: "docs/decisions/013-standardize-on-opentelemetry.md"
        description: |
          - Deployed the OpenTelemetry Collector as a standalone deployment in the K3s cluster.
      - date: "2026-02-09"
        title: "Incident & Root Cause Analysis (RCA) Framework"
        artifacts:
          - name: "RCA 001: Grafana Provisioning Failure"
            url: "docs/incidents/001-grafana-dashboard-provisioning-failure.md"
        description: |
          - Introduced a lightweight RCA workflow to document incidents and debugging steps.
          - Resolved the first incident by switching Grafana dashboard provisioning to JSON-from-file.
      - date: "2026-02-12"
        title: "OpenTelemetry Logs, Metrics, and Traces"
        artifacts:
          - name: "ADR 013: Standardize on OpenTelemetry"
            url: "docs/decisions/013-standardize-on-opentelemetry.md"
          - name: "RCA 002: Service Graph Metrics Failure"
            url: "docs/incidents/002-service-graph-metrics-failure.md"
        description: |
          - Completed the OpenTelemetry path for traces, metrics, and proxy instrumentation across Tempo, Prometheus, and Grafana.
          - Built synthetic traffic validation to confirm traces, dashboards, and service graph behavior under load.
          - Fixed the service graph pipeline by enabling the missing Prometheus and Tempo pieces.
      - date: "2026-02-13"
        title: "Storage Scalability & Security Hardening"
        description: |
          - Moved telemetry storage to S3-compatible object storage with MinIO for better durability.
          - Established a safer default baseline across the core platform services.

  - title: "Platform Maturity & Reusability"
    intro: "The software-architecture chapter: refactoring the Go codebase into reusable internal packages so services, workers, and interfaces share tested platform logic."
    timeline:
      - date: "2026-02-18"
        title: "Library-First Implementation"
        artifacts:
          - name: "ADR 014: Library-First Service Architecture"
            url: "docs/decisions/014-library-first-service-architecture.md"
        description: |
          - Executed the structural transition of the repository into the standard 'internal/' and 'cmd/' layout.
          - Decoupled core business logic into transport-agnostic modules to improve testability and reuse across platform interfaces.
      - date: "2026-02-20"
        title: "Pure Wrapper Architecture & Advanced OTel"
        artifacts:
          - name: "Note: OpenTelemetry & Observability Guide"
            url: "docs/notes/opentelemetry.md"
        description: |
          - Transitioned the Go fleet to a standardized 'Pure Wrapper' architecture, enabling native OpenTelemetry support and advanced operational visibility across all services.
      - date: "2026-02-22"
        title: "Unified Host Telemetry Analytics & Grafana Alloy Retirement"
        artifacts:
          - name: "ADR 015: Unified Host Telemetry Analytics"
            url: "docs/decisions/015-unified-host-telemetry-analytics.md"
          - name: "RCA 003: Thanos Discovery and Retention Failure"
            url: "docs/incidents/003-thanos-discovery-and-retention-failure.md"
        description: |
          - Deployed a resource-efficient Analytics service, centralizing host-level data collection and optimizing processing with batch processing.
          - Retired Alloy and cut idle resource usage significantly while freeing reserved CPU and memory.
          - Completed a more consistent OpenTelemetry-native observability stack for logs, metrics, and traces.

  - title: "The Terraform Era"
    intro: "The infrastructure-as-code chapter: moving Kubernetes platform services into OpenTofu so infrastructure state is declarative, reviewable, and easier to audit over time."
    timeline:
      - date: "2026-03-01"
        title: "Platform Infrastructure: Immutable Orchestration via OpenTofu"
        artifacts:
          - name: "ADR 016: OpenTofu K3s Migration"
            url: "docs/decisions/016-opentofu-k3s-migration.md"
          - name: "RCA 006: Loki Gateway DNS Timeout"
            url: "docs/incidents/006-loki-gateway-dns-timeout.md"
        description: |
          - Moved OpenTelemetry, Grafana, Prometheus, and the supporting K3s observability stack to OpenTofu.
          - Brought MinIO, Thanos, Loki, and Tempo into the same declarative infrastructure workflow.
          - Improved drift detection, persistent workload recovery, and cross-service telemetry discovery.

  - title: "The MCP Era"
    intro: "The agent-native operations chapter: building an MCP gateway for live telemetry, Kubernetes, and host state; reducing noisy observability payloads with Rust; and proving the design with Go-vs-Rust benchmarks for faster, lower-cost investigations."
    timeline:
      - date: "2026-03-08"
        title: "MCP Telemetry and Infrastructure Intelligence"
        artifacts:
          - name: "ADR 017: Agentic Interface via MCP"
            url: "docs/decisions/017-agentic-interface-mcp.md"
          - name: "ADR 018: Domain-Isolated MCP Architecture"
            url: "docs/decisions/018-domain-isolated-mcp-architecture.md"
          - name: "ADR 019: Hybrid Host-MCP Intelligence"
            url: "docs/decisions/019-hybrid-host-mcp-intelligence.md"
        description: |
          - Exposed metrics, semantic logs, distributed traces, Kubernetes events, and host state through MCP.
          - Split capabilities into domain-isolated services to reduce blast radius and enforce least privilege.
          - Connected telemetry, pod state, and host-level signals for focused cross-layer debugging.
          - Introduced `investigate_incident` for structured incident reports from live platform signals.
      - date: "2026-03-19"
        title: "mcp_obs_hub: Unified Agentic Gateway"
        description: |
          - Consolidated telemetry, pods, and hub services into a single `mcp_obs_hub` binary to reduce management overhead.
      - date: "2026-04-06"
        title: "Rust Telemetry Summarization Processor"
        artifacts:
          - name: "ADR 021: Rust Telemetry Summarization Processor"
            url: "docs/decisions/021-rust-telemetry-summarization-processor.md"
          - name: "RCA 007: Worker Ingestion Blocked from MongoDB Atlas"
            url: "docs/incidents/007-worker-ingestion-atlas-egress-block.md"
        description: |
          - Added `obs-processor` to turn large telemetry payloads into agent-friendly summaries before they enter the MCP context window.
          - Reduced context waste while preserving enough signal for logs, metrics, and incident investigation.
      - date: "2026-04-14"
        title: "Structured Obs Processor Summaries"
        artifacts:
          - name: "ADR 022: Obs Processor Structured Summaries"
            url: "docs/decisions/022-obs-processor-structured-summaries.md"
        description: |
          - Upgraded summaries from compressed strings to structured records with timestamps and investigation context.
          - Improved log and metric investigation quality while benchmarks still showed major context reduction.
      - date: "2026-04-17"
        title: "Rust Telemetry Processing Benchmarks"
        artifacts:
          - name: "ADR 023: Benchmark-Validated Rust Obs Processor"
            url: "docs/decisions/023-benchmark-rust-obs-processor.md"
        description: |
          - Benchmarked Go and Rust telemetry processors against the same 24-hour Loki and Prometheus payloads.
          - Established Rust as the faster reduction path, especially for metric summarization where numeric parsing and statistical aggregation dominate.

  - title: "eBPF-Native Efficiency & Networking"
    intro: "The kernel-visibility chapter: using Cilium, Hubble, and Kepler to inspect network flows, protocol behavior, and infrastructure efficiency below the application layer."
    timeline:
      - date: "2026-03-11"
        title: "Kepler Integration & Energy Dashboards"
        artifacts:
          - name: "Dashboard: Sustainability & Efficiency"
            url: "docs/visual/sustainability.png"
          - name: "Dashboard: Infrastructure Health"
            url: "docs/visual/infra-health.png"
        description: |
          - Deployed Kepler to establish an energy-efficiency baseline across the cluster.
          - Added dashboards to correlate workload behavior with power consumption.
      - date: "2026-03-18"
        title: "eBPF-Native Networking & MQTT Visibility"
        artifacts:
          - name: "ADR 020: Cilium eBPF Foundation"
            url: "docs/decisions/020-cilium-ebpf-foundation.md"
          - name: "RCA 004: SSH Lockout Incident"
            url: "docs/incidents/004-ssh-lockout-cilium-ipam-collision.md"
        description: |
          - Migrated the cluster to Cilium with kube-proxy replacement for an eBPF-native datapath.
          - Added L7 MQTT visibility for EMQX without requiring application instrumentation.
          - Resolved a critical SSH lockout during migration and formalized a recovery protocol.

  - title: "GitOps & Operational Maturity"
    intro: "The day-two operations chapter: hardening the platform with ArgoCD reconciliation, deterministic Kustomize rendering, Trivy-backed workload security, safer rollouts, and a clearer GitOps operating model."
    timeline:
      - date: "2026-03-21"
        title: "ArgoCD GitOps & Automated Fleet Promotion"
        artifacts:
          - name: "Screenshot: ArgoCD Fleet Update"
            url: "docs/visual/argocd-ui.png"
        description: |
          - Transitioned the cluster to ArgoCD for continuous reconciliation instead of imperative scripts.
          - Adopted the App-of-Apps pattern to manage the platform from a single source of truth.
          - Validated the GitOps promotion loop by fixing image pull failures caused by SHA-length mismatches.
          - Enabled ArgoCD to reconcile private GHCR images and roll updates across the simulation fleet.
      - date: "2026-03-30"
        title: "Kustomize & RBAC Render Hardening"
        artifacts:
          - name: "RCA 005: Kustomize RBAC Resource Collision"
            url: "docs/incidents/005-kustomize-rbac-resource-collision.md"
        description: |
          - Resolved duplicate resource and namespace collision failures in the tiered Kustomize tree.
          - Split cross-namespace RBAC from overlay-scoped resources so GitOps rendering stayed deterministic.
      - date: "2026-04-17"
        title: "Trivy-Verified Workload Hardening"
        artifacts:
          - name: "ADR 024: Trivy-Verified Workload Hardening"
            url: "docs/decisions/024-trivy-verified-workload-hardening.md"
        description: |
          - Established a Trivy-verified workload hardening baseline for platform-managed containers and Kubernetes manifests.
          - Strengthened the GitOps security posture by making container runtime controls part of the source of truth.
